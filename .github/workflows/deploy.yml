name: Deploy Healthcare Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v || echo "No tests found"

      - name: Validate SQL transform file
        run: |
          if [ ! -s transform/transform.sql ]; then
            echo "❌ transform.sql is missing or empty!"
            exit 1
          fi
          echo "transform.sql is present"

  deploy:
    name: Deploy Cloud Function
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy ingest-raw \
            --gen2 \
            --runtime=python311 \
            --region=us-central1 \
            --source=cloud_function/ \
            --entry-point=ingest_raw \
            --trigger-topic=healthcare-appointments \
            --service-account=cloud-function-sa@${{ secrets.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars=RAW_TABLE_ID=${{ secrets.RAW_TABLE_ID }} \
            --memory=256Mi \
            --timeout=60s \
            --quiet

      - name: Verify deployment
        run: |
          gcloud functions describe ingest-raw \
            --region=us-central1 \
            --format="value(state)"
            --format="value(state)"
